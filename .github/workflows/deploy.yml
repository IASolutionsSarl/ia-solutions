name: Deploy to Infomaniak

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Embed Phosphor font as base64 (Infomaniak blocks .woff)
        run: |
          echo "--- Searching for woff files ---"
          find dist -name "*.woff" -o -name "*.woff2" | head -20
          echo "--- Fonts directory ---"
          find dist -type d -name "*font*" -o -type d -name "*Font*" | head -10
          WOFF=$(find dist -name "*.woff" | head -1)
          echo "WOFF found: $WOFF"
          if [ -n "$WOFF" ]; then
            CSS=$(find dist -path "*/Phosphor/font.css" | head -1)
            echo "CSS found: $CSS"
            B64=$(base64 -w 0 "$WOFF")
            printf "@font-face {\n  font-family: 'Phosphor';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url('data:font/woff;base64,%s') format('woff');\n}\n" "$B64" > "${CSS:-dist/fonts/Phosphor/font.css}"
            echo "Done. CSS size: $(wc -c < "${CSS:-dist/fonts/Phosphor/font.css}") bytes"
          else
            echo "No woff file found!"
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 8l9z2.ftp.infomaniak.com
          username: 8l9z2_yann
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/clients/a2b197dd3e7339d2b359279e39abf149/sites/iasolutions.ch
            rm -rf *
            exit 0

      - name: Upload files via rsync
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /home/clients/a2b197dd3e7339d2b359279e39abf149/sites/iasolutions.ch
          remote_host: 8l9z2.ftp.infomaniak.com
          remote_user: 8l9z2_yann
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
