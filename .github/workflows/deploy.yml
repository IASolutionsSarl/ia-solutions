name: Deploy to Infomaniak

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Copy public assets to dist
        run: cp -r public/icons public/fonts dist/

      - name: Create .htaccess for Apache
        run: printf 'Options -MultiViews\nRewriteEngine On\nRewriteCond %%{REQUEST_FILENAME} !-f\nRewriteCond %%{REQUEST_FILENAME} !-d\nRewriteRule ^ /index.html [L]\n\n<IfModule mod_mime.c>\n    AddType image/svg+xml .svg\n    AddType font/woff .woff\n    AddType font/woff2 .woff2\n</IfModule>\n' > dist/.htaccess

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 8l9z2.ftp.infomaniak.com
          username: 8l9z2_yann
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/clients/a2b197dd3e7339d2b359279e39abf149/sites/iasolutions.ch
            rm -rf *
            exit 0

      - name: Upload files via rsync
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /home/clients/a2b197dd3e7339d2b359279e39abf149/sites/iasolutions.ch
          remote_host: 8l9z2.ftp.infomaniak.com
          remote_user: 8l9z2_yann
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
