name: Deploy to Infomaniak

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Copy public assets to dist
        run: cp -r public/icons public/fonts public/.htaccess dist/ && cp public/icons/.htaccess dist/icons/

      - name: Embed Phosphor font as base64
        run: |
          python3 -c "
import base64
woff_path = 'dist/fonts/Phosphor/f7383446-7c0a-4070-ade4-34001920a0f4.woff'
css_path = 'dist/fonts/Phosphor/font.css'
with open(woff_path, 'rb') as f:
    b64 = base64.b64encode(f.read()).decode()
with open(css_path, 'r') as f:
    css = f.read()
css = css.replace(
    \"url(f7383446-7c0a-4070-ade4-34001920a0f4.woff) format('woff')\",
    f\"url('data:font/woff;base64,{b64}') format('woff')\"
)
with open(css_path, 'w') as f:
    f.write(css)
print('Font embarquee OK')
"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 8l9z2.ftp.infomaniak.com
          username: 8l9z2_yann
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/clients/a2b197dd3e7339d2b359279e39abf149/sites/iasolutions.ch
            rm -rf * .htaccess
            exit 0

      - name: Upload files via rsync
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /home/clients/a2b197dd3e7339d2b359279e39abf149/sites/iasolutions.ch
          remote_host: 8l9z2.ftp.infomaniak.com
          remote_user: 8l9z2_yann
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
